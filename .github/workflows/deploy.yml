name: bobsoolting-service

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Install envsubst
        run: sudo apt-get install -y gettext

      - name: Generate application.yml.template
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.yml.template <<EOL
          spring:
            application:
              name: bobsoolting
            datasource:
              url: jdbc:mariadb://\${DATABASE_HOST}:\${MARIA_DATABASE_PORT}/\${MARIA_DATABASE_NAME}
              username: \${DB_USERNAME}
              password: \${DB_PASSWORD}
              driver-class-name: org.mariadb.jdbc.Driver
            jpa:
              open-in-view: false
              show-sql: true
              database: mysql
              properties:
                hibernate:
                  format_sql: true
              generate-ddl: false
            security:
              oauth2:
                client:
                  registration:
                    kakao:
                      client-id: \${KAKAO_CLIENT_KEY}
                      client-secret: \${KAKAO_CLIENT_SECRET_KEY}
                      client-name: kakao
                      authorization-grant-type: authorization_code
                      redirect-uri: \${KAKAO_BASE_URL}/login/oauth2/code/kakao
                      scope:
                        - profile_nickname
                        - profile_image
                      client-authentication-method: client_secret_post
                  provider:
                    kakao:
                      authorization-uri: https://kauth.kakao.com/oauth/authorize
                      token-uri: https://kauth.kakao.com/oauth/token
                      user-info-uri: https://kapi.kakao.com/v2/user/me
                      user-name-attribute: id
            # Uncomment Redis if needed
            # data:
            #   redis:
            #     host: \${REDIS_HOST}
            #     port: \${REDIS_PORT}
            #     repositories:
            #       enabled: false
          logging:
            level:
              bst.bobsoolting: DEBUG
              org.springframework.security: TRACE
              org.mybatis: DEBUG
              java.sql: DEBUG
          mybatis:
            mapper-locations: classpath:/bst/bobsoolting/mapper/**/*.xml
          cors:
            allowedOrigins: \${CORS_ALLOWED_ORIGINS}
          EOL

      - name: Set application.yml with Secrets
        run: |
          envsubst < src/main/resources/application.yml.template > src/main/resources/application.yml
          echo "Generated application.yml:"
          cat src/main/resources/application.yml
        env:
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          MARIA_DATABASE_PORT: ${{ secrets.MARIA_DATABASE_PORT }}
          MARIA_DATABASE_NAME: ${{ secrets.MARIA_DATABASE_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          KAKAO_CLIENT_KEY: ${{ secrets.KAKAO_CLIENT_KEY }}
          KAKAO_CLIENT_SECRET_KEY: ${{ secrets.KAKAO_CLIENT_SECRET_KEY }}
          KAKAO_BASE_URL: ${{ secrets.KAKAO_BASE_URL }}
          # REDIS_HOST: ${{ secrets.REDIS_HOST }}
          # REDIS_PORT: ${{ secrets.REDIS_PORT }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}

      - name: Build with Gradle
        run: ./gradlew clean build -x test
        shell: bash

      - name: Get current time
        uses: 1466587594/get-current-time@v2
        id: current-time
        with:
          format: YYYY-MM-DDTHH-mm-ss
          utcOffset: "+09:00"

      - name: Show Current Time
        run: echo "CurrentTime=${{steps.current-time.outputs.formattedTime}}"
        shell: bash

      - name: Generate deployment package
        run: |
          mkdir -p deploy
          cp build/libs/*.jar deploy/application.jar
          cp Procfile deploy/Procfile
          cp -r .ebextensions deploy/.ebextensions
          cp -r .platform deploy/.platform
          cd deploy && zip -r deploy.zip .

      - name: Deploy to Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: bobsoolting-server-env
          environment_name: Bobsoolting-server-env
          version_label: github-action-${{steps.current-time.outputs.formattedTime}}
          region: ap-northeast-2
          deployment_package: deploy/deploy.zip
          use_existing_version_if_available: false
          wait_for_deployment: true
          wait_for_environment_recovery: 300
