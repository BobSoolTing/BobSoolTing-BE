server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

spring:
  application:
      name: bobsoolting


  datasource:
    url: jdbc:mariadb://${DATABASE_HOST}:${MARIA_DATABASE_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    open-in-view: false
    show-sql: true
    database: mysql
    properties:
      hibernate:
        format_sql: true
    generate-ddl: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_KEY}
            client-secret: ${KAKAO_CLIENT_SECRET_KEY}
            client-name: kakao
            authorization-grant-type: authorization_code
#            redirect-uri: http://localhost:8080/test
            redirect-uri: http://localhost:3000/login
            # redirect-uri: ${KAKAO_BASE_URL}/login/oauth2/code/kakao
            scope:
              - profile_nickname
              - profile_image
            client-authentication-method: client_secret_post

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      repositories:
        enabled: false

logging:
  level:
    bst.bobsoolting: DEBUG
    org.springframework.security: INFO
    org.mybatis: DEBUG
    java.sql: DEBUG
    org.springframework.web: INFO
    org.springframework.boot.actuate: INFO

mybatis:
  mapper-locations: classpath:/bst/bobsoolting/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    type-handlers-package: bst.bobsoolting.util

cors:
  allowedOrigins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    oauth:
      client-id: ${KAKAO_CLIENT_KEY}
      client-secret: ${KAKAO_CLIENT_SECRET_KEY}
      use-basic-authentication-with-access-code-grant: true
    oauth2RedirectUrl: http://localhost:3000/login
#    oauth2RedirectUrl: http://localhost:8080/test
    # oauth2RedirectUrl: ${KAKAO_BASE_URL}/login/oauth2/code/kakao

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800000
  refresh-token-validity: 604800000