spring:
  application:
      name: bobsoolting

  datasource:
    url: jdbc:mariadb://${DATABASE_HOST}:${MARIA_DATABASE_PORT}/${MARIA_DATABASE_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    open-in-view: false
    show-sql: true
    database: mysql
    properties:
      hibernate:
        format_sql: true
    generate-ddl: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_KEY}
            client-secret: ${KAKAO_CLIENT_SECRET_KEY}
            client-name: kakao
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/login
            # redirect-uri: ${KAKAO_BASE_URL}/login/oauth2/code/kakao
            scope:
              - profile_nickname
              - profile_image
            client-authentication-method: client_secret_post

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

#  data:
#    redis:
#      host: ${REDIS_HOST}
#      port: ${REDIS_PORT}
#      repositories:
#        enabled: false

logging:
  level:
    bst.bobsoolting: DEBUG
    org.springframework.security: TRACE
    org.mybatis: DEBUG
    java.sql: DEBUG

mybatis:
  mapper-locations: classpath:/bst/bobsoolting/mapper/**/*.xml